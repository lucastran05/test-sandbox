name: small-sandbox
hosts:
  - name: server
    base_box:
      image: debian-11
      mgmt_user: debian
    flavor: standard.small
  - name: client
    base_box:
      image: debian-11
      mgmt_user: debian
    flavor: standard.small
networks:
  - name: base-net
    cidr: 17.19.0.0/24

net_mappings:
  - host: server
    network: base-net
    ip: 17.19.0.10

  - host: client
    network: base-net
    ip: 17.19.0.20