name: small-sandbox

hosts:
  - name: server
    base_box:
      image: debian-11
      mgmt_user: debian
    flavor: standard.small

  - name: client
    base_box:
      image: debian-11
      mgmt_user: debian
    flavor: standard.small

routers:
  - name: base-router
    base_box:
      image: debian-11 
      mgmt_user: debian
    flavor: standard.small

networks:
  - name: base-net
    cidr: 172.20.0.0/24

net_mappings:
  - host: server
    network: base-net
    ip: 172.20.0.10

  - host: client
    network: base-net
    ip: 172.20.0.20

router_mappings:
  - router: base-router
    network: base-net
    ip: 172.20.0.1

groups: []